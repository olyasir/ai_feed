# AI Feed Aggregator Configuration

# Minimum interval (seconds) between fetches per source
fetch_intervals:
  rss: 600        # 10 minutes
  arxiv: 300      # 5 minutes
  reddit: 600
  hackernews: 600
  twitter: 3600

# RSS feed URLs
rss_feeds:
  - name: "HuggingFace Blog"
    url: "https://huggingface.co/blog/feed.xml"
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
  - name: "The Verge AI"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
  - name: "NVIDIA Blog"
    url: "https://blogs.nvidia.com/feed/"
  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
  - name: "Apple Machine Learning"
    url: "https://machinelearning.apple.com/rss.xml"
  - name: "Qualcomm AI"
    url: "https://www.qualcomm.com/news/onq/feed"

# Arxiv categories to search
arxiv:
  categories:
    - "cs.AI"
    - "cs.LG"
    - "cs.CL"
    - "cs.CV"
  max_results: 200
  delay_between_calls: 3  # seconds

# Reddit subreddits
reddit:
  subreddits:
    - "MachineLearning"
    - "LocalLLaMA"
    - "EdgeComputing"
    - "MLOps"
  post_limit: 50
  # Set these or use environment variables REDDIT_CLIENT_ID / REDDIT_CLIENT_SECRET
  client_id: ""
  client_secret: ""
  user_agent: "ai_feed_aggregator/1.0"

# Hacker News
hackernews:
  top_stories_count: 100
  concurrency: 10

# Twitter/X (stub - optional)
twitter:
  enabled: false
  bearer_token: ""
  accounts: []

